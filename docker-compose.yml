services:
  oscarr:
    build: .
    container_name: oscarr
    restart: unless-stopped
    network_mode: host
    volumes:
      - oscarr-data:/data
      - ./packages/plugins:/app/packages/plugins
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=file:///data/oscarr.db
      - PORT=3456
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3456
      - SETUP_SECRET=${SETUP_SECRET}
      - INSTALL_FILE_PATH=/data/install.json

volumes:
  oscarr-data:
