name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 0.1.0). Leave empty to tag as 'latest' only."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arediss/oscarr

jobs:
  # Build each platform natively on its own runner
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: [self-hosted, Linux, X64]
          - platform: linux/arm64
            runner: [self-hosted, macOS, ARM64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "pair=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build & push single-platform digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ steps.slug.outputs.pair }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.slug.outputs.pair }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.slug.outputs.pair }},mode=max

  # Trivy scan on the amd64 image (representative of both)
  scan:
    name: Trivy Scan
    needs: build
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-linux-amd64
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Merge platform images into a single multi-arch manifest
  manifest:
    name: Create multi-arch manifest
    needs: [build, scan]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          TAGS="latest"
          if [ -n "$INPUT_TAG" ]; then
            TAGS="${TAGS} ${INPUT_TAG}"
          fi
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS} ${VERSION}"
            MINOR="${VERSION%.*}"
            if [ "$MINOR" != "$VERSION" ]; then
              TAGS="${TAGS} ${MINOR}"
              MAJOR="${MINOR%.*}"
              if [ "$MAJOR" != "$MINOR" ]; then
                TAGS="${TAGS} ${MAJOR}"
              fi
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          SRC_AMD64="${REGISTRY}/${IMAGE_NAME}:build-linux-amd64"
          SRC_ARM64="${REGISTRY}/${IMAGE_NAME}:build-linux-arm64"
          for TAG in $TAGS; do
            FULL="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            echo "Creating manifest for ${FULL}"
            docker buildx imagetools create -t "${FULL}" "${SRC_AMD64}" "${SRC_ARM64}"
          done
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
