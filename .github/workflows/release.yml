name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 0.1.0). Leave empty to tag as 'latest' only."
        required: false
        type: string
      nightly:
        description: "Push as :nightly (not :latest). Use for in-prod test builds."
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arediss/oscarr

jobs:
  # Build each platform natively on its own runner
  build:
    name: Build (${{ matrix.platform }})
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: [self-hosted, Linux, X64]
          - platform: linux/arm64
            runner: [self-hosted, macOS, ARM64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "pair=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build & push single-platform digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ steps.slug.outputs.pair }}
          cache-from: type=local,src=/tmp/docker-cache
          cache-to: type=local,dest=/tmp/docker-cache,mode=max

  # Trivy scan on the amd64 image (representative of both)
  scan:
    name: Trivy Scan
    needs: build
    permissions:
      contents: read
      packages: read
      security-events: write
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-linux-amd64
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Merge platform images into a single multi-arch manifest
  manifest:
    name: Create multi-arch manifest
    needs: [build, scan]
    permissions:
      contents: read
      packages: write
    runs-on: [self-hosted, Linux, X64]
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
      first_tag: ${{ steps.manifest.outputs.first_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        # Tag logic:
        # - Nightly runs (workflow_dispatch with nightly=true) → only push :nightly. No :latest,
        #   no version alias. Lets the owner pull `:nightly` on their prod box for pre-release
        #   verification without affecting users on :latest.
        # - Stable tags (refs/tags/vX.Y.Z without '-') → push :latest + X + X.Y + X.Y.Z.
        # - Pre-release tags (vX.Y.Z-rc.1, v0.1.0-beta, etc.) → push only the full version
        #   (X.Y.Z-rc.1). No :latest alias — prevents rc from hijacking stable consumers.
        # - workflow_dispatch with custom 'tag' input → push that tag plus :latest (legacy
        #   behaviour for ad-hoc stable pushes).
        run: |
          TAGS=""
          if [ "$INPUT_NIGHTLY" = "true" ]; then
            TAGS="nightly"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${VERSION}"
            if [[ "$VERSION" != *-* ]]; then
              # Stable release only — roll out the aliases.
              TAGS="${TAGS} latest"
              MINOR="${VERSION%.*}"
              if [ "$MINOR" != "$VERSION" ]; then
                TAGS="${TAGS} ${MINOR}"
                MAJOR="${MINOR%.*}"
                if [ "$MAJOR" != "$MINOR" ]; then
                  TAGS="${TAGS} ${MAJOR}"
                fi
              fi
            fi
          else
            TAGS="latest"
            if [ -n "$INPUT_TAG" ]; then
              TAGS="${TAGS} ${INPUT_TAG}"
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_NIGHTLY: ${{ inputs.nightly }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Create and push multi-arch manifest
        id: manifest
        run: |
          SRC_AMD64="${REGISTRY}/${IMAGE_NAME}:build-linux-amd64"
          SRC_ARM64="${REGISTRY}/${IMAGE_NAME}:build-linux-arm64"
          FIRST_TAG=""
          for TAG in $TAGS; do
            FULL="${REGISTRY}/${IMAGE_NAME}:${TAG}"
            echo "Creating manifest for ${FULL}"
            docker buildx imagetools create -t "${FULL}" "${SRC_AMD64}" "${SRC_ARM64}"
            if [ -z "$FIRST_TAG" ]; then FIRST_TAG="$TAG"; fi
          done
          # Capture the manifest digest for cosign sign + SBOM attach (immutable, unlike tags).
          DIGEST=$(docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${FIRST_TAG}" --raw | sha256sum | cut -d' ' -f1)
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "first_tag=${FIRST_TAG}" >> "$GITHUB_OUTPUT"
        env:
          TAGS: ${{ steps.tags.outputs.tags }}

  # Supply-chain: generate SBOM + keyless-sign the pushed manifest with cosign. Separate job
  # so a signing failure doesn't block the multi-arch manifest itself (but surfaces loudly).
  # Uses GitHub's OIDC token — no long-lived secret to rotate.
  sign:
    name: SBOM + cosign sign
    needs: manifest
    permissions:
      contents: read
      packages: write
      id-token: write      # cosign keyless signing
      attestations: write  # attach SBOM as an attestation
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.manifest.outputs.first_tag || 'latest' }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Sign image + attach SBOM (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ needs.manifest.outputs.digest }}
        run: |
          REF="${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
          echo "Signing ${REF}"
          cosign sign --yes "${REF}"
          cosign attach sbom --sbom sbom.spdx.json "${REF}"
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "${REF}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90
