name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 0.1.0). Leave empty to tag as 'latest' only."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arediss/oscarr

jobs:
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          TAGS="${REGISTRY}/${IMAGE_NAME}:latest"
          # From workflow_dispatch input
          if [ -n "$INPUT_TAG" ]; then
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${INPUT_TAG}"
          fi
          # From git tag (v1.2.3 → 1.2.3, 1.2, 1)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            MINOR="${VERSION%.*}"
            if [ "$MINOR" != "$VERSION" ]; then
              TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${MINOR}"
              MAJOR="${MINOR%.*}"
              if [ "$MAJOR" != "$MINOR" ]; then
                TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${MAJOR}"
              fi
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ inputs.tag }}

      # Build for scanning first (single platform, loadable)
      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: oscarr:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: oscarr:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Build and push multi-platform (only if scan passed)
      - name: Build & push multi-platform
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
